name: Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          add-job-summary: on-failure

      - name: Trace requirements
        run: ./gradlew --warning-mode=all traceRequirements

      - name: Cache SonarQube packages
        if: ${{ env.SONAR_TOKEN != null }}
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and verify plugin
        run: ./gradlew --stacktrace --warning-mode=all check buildPlugin -x traceRequirements

      - name: OSSIndex audit
        run: ./gradlew --stacktrace --warning-mode=all ossIndexAudit --info
        env:
          OSSINDEX_USERNAME: ${{ secrets.OSSINDEX_USERNAME }}
          OSSINDEX_TOKEN: ${{ secrets.OSSINDEX_TOKEN }}

      - name: Sonar analysis
        if: ${{ env.SONAR_TOKEN != null }}
        run: ./gradlew --stacktrace --warning-mode=all jacocoTestReport sonar -Dsonar.token=$SONAR_TOKEN
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload plugin archive
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: plugin-distribution
          path: build/distributions/*.zip
          if-no-files-found: error

      - name: Upload test and coverage reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-and-coverage-reports
          path: |
            build/reports/tests/test/
            build/reports/jacoco/test/jacocoTestReport.xml
            build/reports/jacoco/test/html/
            build/test-results/test/
          if-no-files-found: warn
